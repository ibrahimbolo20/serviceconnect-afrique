<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Safe target area for maskable elements -->
  <defs>
    <linearGradient id="amberGradM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="shadowM" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#070a13" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Complete solid background for safe cropping -->
  <rect width="512" height="512" fill="url(#amberGradM)" />

  <!-- Shield overlay within safe zone -->
  <circle cx="256" cy="256" r="210" fill="#ffffff" fill-opacity="0.06" />

  <!-- Core connected S & C paths resized safely within the inner 60% boundary -->
  <g transform="translate(16, 16) scale(0.93)" filter="url(#shadowM)">
    <path d="M 190,150 
             C 190,150 290,130 340,180 
             C 380,220 320,280 256,280 
             C 180,280 140,330 170,390 
             C 210,440 330,410 330,410" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <circle cx="190" cy="150" r="20" fill="#1e293b" stroke="#ffffff" stroke-width="6" />
    <circle cx="330" cy="410" r="20" fill="#1e293b" stroke="#ffffff" stroke-width="6" />
    <circle cx="256" cy="280" r="16" fill="#f59e0b" stroke="#ffffff" stroke-width="5" />
  </g>
</svg>
